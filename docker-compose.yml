services:
  # Zenoh bridge - bridges ROS2 DDS topics to Zenoh for OM1 consumption
  zenoh_bridge:
    image: om1-sim:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: zenoh-bridge-ros2dds -c /app/om1_sim/zenoh/zenoh_bridge_config.json5
    network_mode: host
    privileged: true
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///app/om1_sim/cyclonedds/cyclonedds.xml
    volumes:
      - ./zenoh:/app/om1_sim/zenoh
      - ./cyclonedds:/app/om1_sim/cyclonedds

  # Go2 Gazebo simulation - launches Gazebo + all sim nodes + om_path
  go2_sim:
    image: om1-sim:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: ros2 launch go2_sim go2_launch.py rviz:=false
    network_mode: host
    privileged: true
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///app/om1_sim/cyclonedds/cyclonedds.xml
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./cyclonedds:/app/om1_sim/cyclonedds
